<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meet Bibi Junior</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bibi Jr.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FFC2D1">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #FFE5EC 0%, #FFC2D1 50%, #F0E6FF 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
            overscroll-behavior-y: contain; 
        }
        .fancy-title {
            font-family: 'Dancing Script', cursive;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Glassmorphic card styling */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(255, 182, 193, 0.2);
        }
        
        /* Floating Hearts Animation */
        @keyframes flyUp {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
        .flying-heart {
            position: absolute;
            animation: flyUp 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            font-size: 1.5rem;
            z-index: 50;
        }
        
        /* Giant Pop-up Kiss Animation */
        .kiss-pop {
            transform: scale(0);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .kiss-pop.active {
            transform: scale(1) rotate(-15deg);
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8 text-gray-700 relative">

    <div id="heart-container" class="fixed inset-0 pointer-events-none z-40 overflow-hidden"></div>

    <div id="big-kiss" class="fixed inset-0 pointer-events-none z-50 flex items-center justify-center kiss-pop">
        <span class="text-[8rem] md:text-[12rem] drop-shadow-2xl">💋</span>
    </div>

    

    <div class="w-full max-w-xl glass-panel rounded-3xl p-6 md:p-10 flex flex-col items-center justify-between text-center transition-all duration-500 shadow-xl relative z-10">
        
        <div class="w-full flex flex-col items-start max-w-md mx-auto relative mt-2 mb-6">
            
            <div class="flex items-center gap-2 mb-2 ml-4">
                <div class="w-9 h-9 rounded-full bg-white border border-white/60 flex items-center justify-center text-[18px] shadow-sm animate-bounce duration-1000">
                    😎
                </div>
                <span class="text-xs font-bold tracking-widest uppercase text-gray-500">Bibi Junior</span>
            </div>

            <div class="w-full min-h-[150px] flex flex-col items-center justify-center p-6 sm:p-8 bg-white/70 backdrop-blur-md rounded-3xl rounded-tl-none border border-white/80 shadow-[0_8px_30px_rgb(0,0,0,0.04)] relative">
                
                <div id="speech-content" class="w-full transition-opacity duration-500">
                    <
                    
                    <p class="text-base md:text-lg font-medium text-gray-700 leading-relaxed text-left space-y-4">
                        <span class="block mb-3">
                          Goodafternoon✨ Sarkar Ji, Bibi senior uth gye hai lekin kaam kr rhe hai isliye unhone mujhe bola apko ye btane ke liye.
                        </span>
                        
                    </p>
                </div>

            </div>

        </div>

        <div class="w-full flex justify-center mt-4 h-12" id="button-container">
            <button onclick="triggerMagic()" class="px-8 py-3 bg-gradient-to-r from-[#FF7096] to-[#FFA6C1] text-white text-sm font-bold tracking-wider uppercase rounded-full shadow-md hover:shadow-lg transform hover:scale-105 active:scale-95 transition-all duration-200 cursor-pointer border border-white/20">
                Should I tell him to call you?
            </button>
        </div>

    </div>

    <script>
        function triggerMagic() {
            // 1. Hide the button
            const btnContainer = document.getElementById('button-container');
            btnContainer.style.opacity = '0';
            btnContainer.style.pointerEvents = 'none';

            // 2. Show the Giant Kiss
            const bigKiss = document.getElementById('big-kiss');
            bigKiss.classList.add('active');
            
            setTimeout(() => {
                bigKiss.classList.remove('active');
            }, 1500);

            // 3. Generate Floating Hearts
            const heartContainer = document.getElementById('heart-container');
            const emojis = ['❤️', '💖', '💕', '✨', '🥰'];
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'flying-heart';
                    heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
                    
                    heartContainer.appendChild(heart);
                    
                    setTimeout(() => {
                        heart.remove();
                    }, 3500);
                }, i * 50);
            }

            // 4. Update the text smoothly
            const speechContent = document.getElementById('speech-content');
            speechContent.style.opacity = '0';
            
            setTimeout(() => {
                speechContent.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-[100px] py-4">
                        
                    </div>
                `;
                speechContent.style.opacity = '1';
            }, 500);
        }
    </script>
</body>
</html>
