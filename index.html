<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat with Bibi Jr.</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FFC2D1">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #FFE5EC 0%, #FFC2D1 50%, #F0E6FF 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            /* Ensures the app takes exactly the screen height on mobile */
            height: 100dvh; 
            margin: 0;
            overflow: hidden;
        }
        .fancy-title {
            font-family: 'Dancing Script', cursive;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Custom Scrollbar for Chat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 112, 150, 0.3); border-radius: 10px; }

        /* Glass Panels */
        .glass-main {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(255, 112, 150, 0.15);
        }
        .glass-bubble-ai {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-top-left-radius: 4px; /* Creates the chat tail effect */
        }
        .glass-bubble-user {
            background: linear-gradient(135deg, #FF7096, #FFA6C1);
            box-shadow: 0 4px 15px rgba(255, 112, 150, 0.3);
            border-top-right-radius: 4px;
        }
        
        /* Typing animation dots */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="p-2 sm:p-4 md:p-8 flex justify-center items-center">

    <div class="glass-main w-full max-w-4xl h-full flex flex-col rounded-3xl overflow-hidden relative">
        
        <header class="h-16 md:h-20 border-b border-white/40 flex items-center justify-between px-6 bg-white/20 z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-white border border-white/60 flex items-center justify-center text-[20px] shadow-sm">
                    😎
                </div>
                <div>
                    <h1 class="font-bold text-gray-700 leading-tight">Bibi Junior</h1>
                    <p class="text-[10px] text-green-500 font-bold tracking-widest uppercase flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Online
                    </p>
                </div>
            </div>
            
            <button class="w-10 h-10 rounded-full bg-white/40 text-[#FF7096] hover:bg-white/70 transition-colors flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-heart"></i>
            </button>
        </header>

        <main id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 scroll-smooth">
            
            <div class="text-center my-8">
                <h2 class="fancy-title text-4xl text-[#FF7096] mb-2 drop-shadow-sm">Hello, Boss Lady ✨</h2>
                <p class="text-sm text-gray-500 font-medium">How can I make your day special today?</p>
            </div>

            <div class="flex items-start gap-3 w-full max-w-3xl">
                <div class="w-8 h-8 rounded-full bg-white border border-white/60 flex-shrink-0 flex items-center justify-center text-[16px] shadow-sm mt-1">
                    😎
                </div>
                <div class="glass-bubble-ai rounded-2xl p-4 text-gray-700 text-[15px] leading-relaxed shadow-sm">
                    I'm here and ready! Ask me for a hint about your surprise, or just tell me how much you miss that careless husband of yours. 😉
                </div>
            </div>

        </main>

        <div id="typing-indicator" class="hidden px-6 py-2 pb-4 items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-white border border-white/60 flex items-center justify-center text-[16px]">😎</div>
            <div class="glass-bubble-ai rounded-full px-4 py-2 flex gap-1">
                <span class="w-2 h-2 bg-[#FF7096] rounded-full typing-dot"></span>
                <span class="w-2 h-2 bg-[#FF7096] rounded-full typing-dot"></span>
                <span class="w-2 h-2 bg-[#FF7096] rounded-full typing-dot"></span>
            </div>
        </div>

        <footer class="p-4 sm:p-6 bg-white/20 backdrop-blur-md border-t border-white/40">
            <div class="w-full max-w-3xl mx-auto relative flex items-end bg-white/60 rounded-3xl border border-white/80 shadow-[0_4px_20px_rgba(0,0,0,0.03)] p-2">
                
                <button class="w-10 h-10 rounded-full text-gray-400 hover:text-[#FF7096] hover:bg-white/50 transition-colors flex-shrink-0 flex items-center justify-center">
                    <i class="fa-solid fa-gift"></i>
                </button>

                <textarea 
                    id="chat-input" 
                    rows="1"
                    placeholder="Type a message to Bibi Jr..." 
                    class="flex-1 bg-transparent outline-none text-gray-700 placeholder-gray-400 px-3 py-2.5 resize-none max-h-32 text-[15px]"
                    oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                    onkeypress="handleEnter(event)"
                ></textarea>

                <button onclick="sendUserMessage()" class="w-10 h-10 rounded-full text-white bg-[#FF7096] hover:bg-[#FF85A2] transition-colors flex-shrink-0 flex items-center justify-center shadow-md hover:scale-105 active:scale-95 mb-0.5 mr-0.5">
                    <i class="fa-solid fa-paper-plane text-sm ml-0.5"></i>
                </button>
            </div>
            <div class="text-center mt-2">
                <span class="text-[10px] text-gray-400 uppercase tracking-wider">AI responses may be incredibly sweet.</span>
            </div>
        </footer>

    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const typingIndicator = document.getElementById('typing-indicator');

        // Submit on Enter (Shift+Enter for new line)
        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendUserMessage();
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        function sendUserMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // 1. Create and Append User Bubble
            const userHTML = `
                <div class="flex items-start gap-3 w-full max-w-3xl ml-auto flex-row-reverse opacity-0 transition-opacity duration-300" id="msg-${Date.now()}">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#FF7096] to-[#D4A5FF] flex-shrink-0 flex items-center justify-center text-white text-[12px] shadow-sm mt-1">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="glass-bubble-user rounded-2xl p-4 text-white text-[15px] leading-relaxed">
                        ${text.replace(/\n/g, '<br>')}
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', userHTML);
            
            // Trigger fade-in animation
            const newMsg = chatContainer.lastElementChild;
            setTimeout(() => newMsg.classList.remove('opacity-0'), 50);

            // 2. Clear input and reset height
            chatInput.value = '';
            chatInput.style.height = 'auto';
            scrollToBottom();

            // 3. Simulate AI typing and response
            simulateBibiResponse();
        }

        function simulateBibiResponse() {
            // Show typing indicator
            typingIndicator.classList.remove('hidden');
            typingIndicator.classList.add('flex');
            scrollToBottom();

            // Wait 1.5 seconds, then reply
            setTimeout(() => {
                typingIndicator.classList.add('hidden');
                typingIndicator.classList.remove('flex');

                const responses = [
                    "I will have to check with the big boss about that! But in the meantime... you look stunning today! 😎",
                    "Hmm, I could tell you... but where's the fun in that? Go check the kitchen counter! 🤫",
                    "He programmed me to tell you that he loves you way more than he loves playing video games. (And that's saying a lot!) 💖",
                    "Error 404: I cannot compute how beautiful you are. System overload! 🤖💥"
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];

                const aiHTML = `
                    <div class="flex items-start gap-3 w-full max-w-3xl opacity-0 transition-opacity duration-300">
                        <div class="w-8 h-8 rounded-full bg-white border border-white/60 flex-shrink-0 flex items-center justify-center text-[16px] shadow-sm mt-1">
                            😎
                        </div>
                        <div class="glass-bubble-ai rounded-2xl p-4 text-gray-700 text-[15px] leading-relaxed shadow-sm">
                            ${randomResponse}
                        </div>
                    </div>
                `;
                chatContainer.insertAdjacentHTML('beforeend', aiHTML);
                
                const newAiMsg = chatContainer.lastElementChild;
                setTimeout(() => newAiMsg.classList.remove('opacity-0'), 50);
                
                scrollToBottom();
            }, 1500);
        }
    </script>
</body>
</html>
