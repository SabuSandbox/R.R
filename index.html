<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Bibi Jr.</title>
    <style>
        body { margin: 0; background: #FFE5EC; display: flex; flex-direction: column; height: 100vh; }
        /* The container for Botpress */
        #bibi-chat-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="bibi-chat-container"></div>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const script = document.createElement('script');
            script.src = "https://files.bpcontent.cloud/2026/06/27/04/20260627042149-ZZLP9WDM.js";
            script.async = true;
            document.body.appendChild(script);
        });
    </script>

</body>
</html>
