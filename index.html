<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat with Bibi Jr.</title>
    
    <style>
        /* 1. Our Romantic Animated Background */
        body {
            background: linear-gradient(135deg, #FFE5EC 0%, #FFC2D1 50%, #F0E6FF 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100dvh; 
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Help the embedded Botpress fill the remaining space */
        #bp-web-widget-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
 <body>
    <div id="bibi-chat-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@botpress/webchat@latest/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/06/27/04/20260627042149-ZZLP9WDM.js" defer></script>
</body>
</html>
